<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Forca Romântico</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        color: #333;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: rgba(255,255,255,0.25);
        backdrop-filter: blur(18px);
        padding: 35px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
        width: 90%;
        max-width: 650px;
        animation: fadeIn 1s ease-in-out;
    }

    h1 {
        font-family: 'Dancing Script', cursive;
        font-size: 52px;
        margin-bottom: 10px;
        color: #b30059;
    }

    p {
        margin-bottom: 20px;
        font-weight: 300;
    }

    #word {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        margin: 25px 0;
    }

    .letter-box {
        width: 40px;
        height: 50px;
        border-radius: 12px;
        background: rgba(255,255,255,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: 0.3s;
    }

    .letter-box.empty {
        background: rgba(255,255,255,0.4);
        border: 2px dashed #ff6f91;
    }

    #letters {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
    }

    #letters button {
        background: linear-gradient(145deg, #ffffff, #ffe6eb);
        border: 2px solid rgba(255, 105, 135, 0.3);
        border-radius: 14px;
        padding: 10px 14px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        color: #b30059;
    }

    #letters button:hover {
        transform: translateY(-4px) scale(1.12);
        background: linear-gradient(145deg, #ffd1dc, #ff9ab0);
        color: #fff;
        box-shadow: 0 10px 20px rgba(0,0,0,0.25);
    }

    #letters button:active {
        transform: scale(0.95);
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    #letters button:disabled {
        background: #eee;
        color: #aaa;
        border: 2px solid #ddd;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    #hint {
        margin-top: 20px;
        font-size: 18px;
        color: #b30059;
        min-height: 24px;
        font-style: italic;
        animation: fadeIn 0.5s ease;
    }

    #message {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
    }

    .hearts {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        overflow: hidden;
    }

    .heart {
        position: absolute;
        color: rgba(255,0,100,0.5);
        font-size: 20px;
        animation: float 6s linear infinite;
    }

    @keyframes float {
        from { transform: translateY(100vh) scale(1); }
        to { transform: translateY(-10vh) scale(1.5); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">
    <h1>Jogo da Forca 💖</h1>
    <p>Acerte o nome especial...</p>

    <div id="word"></div>
    <div id="letters"></div>
    <div id="hint"></div>
    <div id="message"></div>
</div>

<script>
const palavra = "LAIS DIAS ROVEDA";
let palavraExibida = [];
let erros = 0;

const dicas = [
    "É a garota mais linda ❤️",
    "Seu sorriso ilumina tudo ✨",
    "Tem o olhar mais encantador 😍",
    "É dona do meu coração 💘",
    "Cada detalhe dela é perfeito 💖",
    "Faz meu mundo mais feliz 🌹",
    "É simplesmente inesquecível 💞"
];

function iniciar() {
    for (let i = 0; i < palavra.length; i++) {
        if (palavra[i] === " ") {
            palavraExibida.push(" ");
        } else {
            palavraExibida.push("_");
        }
    }
    atualizarPalavra();
    criarBotoes();
    criarCoracoes();
}

function atualizarPalavra() {
    const container = document.getElementById("word");
    container.innerHTML = "";

    palavraExibida.forEach(letra => {
        const div = document.createElement("div");
        div.className = "letter-box";

        if (letra === "_") {
            div.classList.add("empty");
            div.innerText = "";
        } else {
            div.innerText = letra;
        }

        container.appendChild(div);
    });
}

function criarBotoes() {
    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const container = document.getElementById("letters");

    for (let letra of letras) {
        const btn = document.createElement("button");
        btn.innerText = letra;
        btn.onclick = () => tentarLetra(letra, btn);
        container.appendChild(btn);
    }
}

function tentarLetra(letra, botao) {
    botao.disabled = true;
    let acertou = false;

    for (let i = 0; i < palavra.length; i++) {
        if (palavra[i] === letra) {
            palavraExibida[i] = letra;
            acertou = true;
        }
    }

    if (!acertou) {
        erros++;
        mostrarDica();
    }

    atualizarPalavra();
    verificarFim();
}

function mostrarDica() {
    const hint = document.getElementById("hint");
    hint.innerText = dicas[erros - 1] || "Mesmo errando, você continua especial 💕";
}

function verificarFim() {
    if (!palavraExibida.includes("_")) {
        document.getElementById("message").innerText = "Parabéns! Você descobriu o amor da sua vida 💍";
        desativarBotoes();
    }

    if (erros >= dicas.length) {
        document.getElementById("message").innerText = "Você perdeu 😢 Mas o nome era: " + palavra;
        desativarBotoes();
    }
}

function desativarBotoes() {
    const botoes = document.querySelectorAll("#letters button");
    botoes.forEach(btn => btn.disabled = true);
}

function criarCoracoes() {
    const container = document.getElementById("hearts");
    for (let i = 0; i < 20; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 4) + "s";
        heart.style.fontSize = (15 + Math.random() * 20) + "px";
        container.appendChild(heart);
    }
}

iniciar();
</script>

</body>
</html>
